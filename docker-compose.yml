version: "3"

services:
  backend:
    build: ./backend
    container_name: backend_staging
    ports:
      - "5002:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend_staging
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: always